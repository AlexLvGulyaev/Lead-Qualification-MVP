# n8n Lead Qualification Assistant
# Docker Compose Configuration
# Version: 1.1
# Architecture: Separate databases for n8n internal and business data

services:
  # ============================================================================
  # PostgreSQL - Primary database server
  # Hosts two databases:
  #   - n8n: internal n8n platform tables
  #   - lead_qualification: business data tables
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: lead-qualification-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Do not set POSTGRES_DB - let init scripts create both databases
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts: 00- creates databases (bash), 01- creates business schema (SQL)
      - ./sql/00-init-databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh:ro
      - ./sql/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    networks:
      - lead-qualification-network
    healthcheck:
      # Check connection to n8n database (n8n's primary database)
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================================
  # n8n - Workflow automation platform
  # Uses dedicated 'n8n' database for internal tables
  # ============================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: lead-qualification-n8n
    restart: unless-stopped
    environment:
      # Basic configuration
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - NODE_ENV=${NODE_ENV:-production}

      # API Key for automation
      - N8N_API_KEY=${N8N_API_KEY:-n8n-api-key-lead-qual-2024}

      # Database configuration - n8n uses its own database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

      # Security
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD is required}
      - N8N_SECURE_COOKIE=false

      # API keys (passed from .env)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}

      # CRM credentials (passed from .env)
      - KOMMO_ACCESS_TOKEN=${KOMMO_ACCESS_TOKEN:-}
      - KOMMO_SUBDOMAIN=${KOMMO_SUBDOMAIN:-}
      - BITRIX24_WEBHOOK_URL=${BITRIX24_WEBHOOK_URL:-}

      # Timezone
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Moscow}

      # Logging
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}

    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    networks:
      - lead-qualification-network
      - traefik
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # Admin Backend API - FastAPI backend for Admin UI
  # ============================================================================
  admin-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: lead-qualification-admin-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-n8n}:${POSTGRES_PASSWORD}@postgres:5432/lead_qualification
      - CORS_ORIGINS=*
      - KOMMO_SUBDOMAIN=${KOMMO_SUBDOMAIN:-yourcompany}
      - N8N_HOST=${N8N_HOST:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - KOMMO_ACCESS_TOKEN=${KOMMO_ACCESS_TOKEN:-}
    networks:
      - lead-qualification-network
      - traefik
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/admin/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Admin UI - Static file server for Admin UI
  # ============================================================================
  admin-ui:
    image: nginx:alpine
    container_name: lead-qualification-admin-ui
    restart: unless-stopped
    volumes:
      - ../admin-ui:/usr/share/nginx/html:ro
      - ./docker/nginx/admin-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lead-qualification-network
      - traefik
    depends_on:
      - admin-backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Client UI - Static file server
  # Serves the web form for lead submission
  # ============================================================================
  client-ui:
    image: nginx:alpine
    container_name: lead-qualification-client-ui
    restart: unless-stopped
    volumes:
      - ../client-ui:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lead-qualification-network
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Landing - Demo Landing Hub
  # Central entry point for demo access
  # ============================================================================
  landing:
    image: nginx:alpine
    container_name: lead-qualification-landing
    restart: unless-stopped
    volumes:
      - ../landing:/usr/share/nginx/html:ro
      - ./docker/nginx/landing-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lead-qualification-network
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================================
# Networks
# ============================================================================
networks:
  lead-qualification-network:
    driver: bridge
    name: lead-qualification-network
  traefik:
    external: true
    name: n8n_default

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    name: lead-qualification-postgres-data
  n8n_data:
    name: lead-qualification-n8n-data
